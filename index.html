<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300..600&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="light"] {
    --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #ffffff;
    --color-border: #e0ddd8; --color-text: #28251d; --color-text-muted: #7a7974;
    --color-text-faint: #bab9b4; --color-primary: #d97706; --color-primary-hover: #b45309;
    --color-divider: #dcd9d5;
    --shadow-sm: 0 1px 3px oklch(0.2 0.01 80 / 0.06);
    --shadow-md: 0 6px 20px oklch(0.2 0.01 80 / 0.09);
    --shadow-lg: 0 16px 40px oklch(0.2 0.01 80 / 0.13);
    --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1.1rem;
    --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
    --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
    --space-12: 3rem; --space-16: 4rem;
    --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
    --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
    --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
    --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
    --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
    --font-body: 'DM Sans', sans-serif;
    --font-display: 'Instrument Serif', Georgia, serif;
    --transition: 200ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"] {
    --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #222120;
    --color-border: #393836; --color-text: #cdccca; --color-text-muted: #797876;
    --color-text-faint: #5a5957; --color-primary: #f59e0b; --color-primary-hover: #d97706;
    --color-divider: #262523;
    --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.2);
    --shadow-md: 0 6px 20px oklch(0 0 0 / 0.35);
    --shadow-lg: 0 16px 40px oklch(0 0 0 / 0.45);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  body {
    min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base);
    color: var(--color-text); background: var(--color-bg);
    transition: background var(--transition), color var(--transition);
  }
  img { display: block; max-width: 100%; }
  button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: color-mix(in oklab, var(--color-bg) 85%, transparent);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.07);
    padding: var(--space-4) var(--space-8);
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    display: flex; align-items: center; gap: var(--space-2);
    font-family: var(--font-display); font-size: var(--text-lg); color: var(--color-text);
    text-decoration: none;
  }
  .logo svg { color: var(--color-primary); }
  .header-actions { display: flex; align-items: center; gap: var(--space-3); }
  .search-bar {
    display: flex; align-items: center; gap: var(--space-2);
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 9999px; padding: var(--space-2) var(--space-4);
    font-size: var(--text-sm); color: var(--color-text-muted);
    transition: border-color var(--transition), box-shadow var(--transition);
    min-width: 220px;
  }
  .search-bar input {
    border: none; background: none; outline: none;
    font: inherit; color: var(--color-text); width: 100%;
  }
  .search-bar input::placeholder { color: var(--color-text-faint); }
  .search-bar:focus-within {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.12);
  }
  .theme-toggle {
    width: 38px; height: 38px; border-radius: var(--radius-lg);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-text-muted); transition: background var(--transition), color var(--transition);
  }
  .theme-toggle:hover { background: var(--color-surface); color: var(--color-text); }
  .add-btn {
    display: flex; align-items: center; gap: var(--space-2);
    background: var(--color-primary); color: white;
    padding: var(--space-2) var(--space-4);
    border-radius: 9999px; font-size: var(--text-sm); font-weight: 500;
    transition: background var(--transition), transform var(--transition);
  }
  .add-btn:hover { background: var(--color-primary-hover); transform: translateY(-1px); }

  /* HERO */
  .hero { text-align: center; padding: var(--space-16) var(--space-8) var(--space-10); }
  .hero-eyebrow {
    display: inline-block; font-size: var(--text-xs); font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--color-primary);
    background: color-mix(in oklab, var(--color-primary) 10%, var(--color-bg));
    padding: var(--space-1) var(--space-3); border-radius: 9999px; margin-bottom: var(--space-4);
  }
  .hero h1 { font-family: var(--font-display); font-size: var(--text-xl); line-height: 1.15; margin-bottom: var(--space-4); }
  .hero h1 em { font-style: italic; color: var(--color-primary); }
  .hero p { font-size: var(--text-sm); color: var(--color-text-muted); max-width: 52ch; margin: 0 auto; }

  /* FILTERS */
  .filters {
    display: flex; flex-wrap: wrap; gap: var(--space-2); justify-content: center;
    padding: 0 var(--space-8) var(--space-8);
  }
  .filter-btn {
    font-size: var(--text-xs); font-weight: 500;
    padding: var(--space-2) var(--space-4);
    border-radius: 9999px; border: 1px solid var(--color-border);
    background: var(--color-surface); color: var(--color-text-muted);
    transition: all var(--transition);
  }
  .filter-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
  .filter-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: white; }

  /* GRID */
  .grid-wrapper {
    max-width: 1200px; margin: 0 auto;
    padding: 0 var(--space-8) var(--space-16);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
    gap: var(--space-5);
  }

  /* CARD */
  .card {
    background: var(--color-surface-2);
    border: 1px solid oklch(from var(--color-text) l c h / 0.08);
    border-radius: var(--radius-xl); overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    display: flex; flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px); box-shadow: var(--shadow-lg);
    border-color: oklch(from var(--color-primary) l c h / 0.3);
  }
  .card-banner { height: 120px; position: relative; overflow: hidden; }
  .card-banner-img { width: 100%; height: 100%; object-fit: cover; }
  .card-banner-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--banner-from, #fde68a), var(--banner-to, #fbbf24));
  }
  .card-banner-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
  }
  .card-body { padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-3); flex: 1; }
  .card-header { display: flex; align-items: flex-start; gap: var(--space-3); margin-top: calc(-1 * var(--space-8)); position: relative; }
  .food-icon {
    width: 56px; height: 56px; border-radius: var(--radius-lg);
    border: 3px solid var(--color-surface-2);
    background: var(--color-surface-2); box-shadow: var(--shadow-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; flex-shrink: 0; overflow: hidden;
  }
  .food-icon img { width: 100%; height: 100%; object-fit: cover; }
  .food-meta { padding-top: var(--space-4); }
  .food-name { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); line-height: 1.2; }
  .food-brand { font-size: var(--text-xs); color: var(--color-primary); font-weight: 500; margin-top: 2px; }
  .food-comment { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.55; flex: 1; font-style: italic; }
  .card-divider { height: 1px; background: var(--color-divider); margin: 0 calc(-1 * var(--space-5)); }
  .card-stats { display: flex; gap: var(--space-4); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-value { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); font-variant-numeric: tabular-nums; }
  .stat-label { font-size: var(--text-xs); color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.05em; }
  .card-tags { display: flex; flex-wrap: wrap; gap: var(--space-2); }
  .tag {
    font-size: var(--text-xs); font-weight: 500; padding: 3px var(--space-2);
    border-radius: var(--radius-sm);
    background: color-mix(in oklab, var(--color-primary) 10%, var(--color-bg));
    color: var(--color-primary);
  }
  .tag.alt {
    background: color-mix(in oklab, var(--color-text-faint) 15%, var(--color-bg));
    color: var(--color-text-muted);
  }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: var(--space-2); }
  .food-date { display: flex; align-items: center; gap: 4px; font-size: var(--text-xs); color: var(--color-text-faint); }
  .rating { display: flex; align-items: center; gap: 4px; font-size: var(--text-xs); font-weight: 600; color: var(--color-text); }
  .rating-stars { color: #d97706; letter-spacing: -1px; font-size: 0.85rem; }
  .card-actions { display: flex; gap: var(--space-2); justify-content: flex-end; padding-top: var(--space-2); }
  .btn-icon {
    width: 30px; height: 30px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-text-muted); transition: background var(--transition), color var(--transition);
    border: 1px solid var(--color-border);
  }
  .btn-icon:hover { background: var(--color-surface); }
  .btn-icon.delete:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: oklch(0 0 0 / 0.5); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: var(--space-4);
    opacity: 0; pointer-events: none; transition: opacity var(--transition);
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--color-surface-2); border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg); width: 100%; max-width: 520px;
    max-height: 90dvh; overflow-y: auto;
    transform: translateY(20px); transition: transform var(--transition);
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--space-5) var(--space-6);
    border-bottom: 1px solid var(--color-divider);
    position: sticky; top: 0; background: var(--color-surface-2); z-index: 1;
  }
  .modal-title { font-family: var(--font-display); font-size: var(--text-lg); }
  .modal-close {
    width: 32px; height: 32px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-text-muted); transition: background var(--transition);
  }
  .modal-close:hover { background: var(--color-surface); }
  .modal-body { padding: var(--space-6); display: flex; flex-direction: column; gap: var(--space-4); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
  .form-group { display: flex; flex-direction: column; gap: var(--space-2); }
  .form-group label { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
    font: inherit; font-size: var(--text-sm); color: var(--color-text);
    outline: none; transition: border-color var(--transition), box-shadow var(--transition);
    width: 100%;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.12);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .star-picker { display: flex; gap: var(--space-2); align-items: center; }
  .star-btn { font-size: 1.6rem; color: var(--color-text-faint); transition: color var(--transition), transform var(--transition); line-height: 1; }
  .star-btn:hover, .star-btn.active { color: #d97706; transform: scale(1.15); }
  .image-upload-area {
    border: 2px dashed var(--color-border); border-radius: var(--radius-lg);
    padding: var(--space-6); text-align: center; cursor: pointer;
    transition: border-color var(--transition), background var(--transition);
    position: relative;
  }
  .image-upload-area:hover { border-color: var(--color-primary); background: color-mix(in oklab, var(--color-primary) 4%, var(--color-bg)); }
  .image-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .image-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-md); margin-top: var(--space-3); display: none; }
  .upload-hint { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-2); }
  .modal-footer {
    display: flex; gap: var(--space-3); justify-content: flex-end;
    padding: var(--space-4) var(--space-6);
    border-top: 1px solid var(--color-divider);
  }
  .btn { padding: var(--space-2) var(--space-5); border-radius: 9999px; font-size: var(--text-sm); font-weight: 500; transition: all var(--transition); }
  .btn-secondary { border: 1px solid var(--color-border); color: var(--color-text-muted); }
  .btn-secondary:hover { background: var(--color-surface); color: var(--color-text); }
  .btn-primary { background: var(--color-primary); color: white; }
  .btn-primary:hover { background: var(--color-primary-hover); }

  /* EMPTY */
  .empty-state { grid-column: 1/-1; text-align: center; padding: var(--space-16); color: var(--color-text-muted); }

  @media (max-width: 600px) {
    .header { padding: var(--space-3) var(--space-4); }
    .search-bar { min-width: 130px; }
    .hero { padding: var(--space-10) var(--space-4) var(--space-6); }
    .filters { padding: 0 var(--space-4) var(--space-6); }
    .grid-wrapper { padding: 0 var(--space-4) var(--space-10); gap: var(--space-4); }
    .form-row { grid-template-columns: 1fr; }
    .add-btn span { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a class="logo" href="#">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
      <path d="M8 11c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zM14 11c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2z"/>
      <path d="M7 16c1.1 1.2 2.8 2 5 2s3.9-.8 5-2"/>
    </svg>
    TasteLog
  </a>
  <div class="header-actions">
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search food…" id="search-input" aria-label="Search food">
    </div>
    <button class="add-btn" id="open-modal">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      <span>Add Entry</span>
    </button>
    <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <span class="hero-eyebrow">Food Taste Tracker</span>
  <h1>Track every <em>taste</em> you try</h1>
  <p>Log juices, chips, snacks and more — with brand, rating, price, date and your personal notes.</p>
</section>

<!-- FILTERS -->
<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="Juice">Juice</button>
  <button class="filter-btn" data-filter="Chips">Chips</button>
  <button class="filter-btn" data-filter="Snack">Snack</button>
  <button class="filter-btn" data-filter="Drink">Drink</button>
  <button class="filter-btn" data-filter="Candy">Candy</button>
  <button class="filter-btn" data-filter="Other">Other</button>
</div>

<!-- GRID -->
<main class="grid-wrapper" id="card-grid" aria-label="Food entries"></main>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Food Entry</span>
      <button class="modal-close" id="close-modal" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label for="f-name">Food Name *</label>
          <input type="text" id="f-name" placeholder="e.g. Pringles Original">
        </div>
        <div class="form-group">
          <label for="f-brand">Brand / Company *</label>
          <input type="text" id="f-brand" placeholder="e.g. Pringles">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="f-category">Category *</label>
          <select id="f-category">
            <option value="">Select…</option>
            <option value="Juice">Juice</option>
            <option value="Chips">Chips</option>
            <option value="Snack">Snack</option>
            <option value="Drink">Drink</option>
            <option value="Candy">Candy</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-price">Price (৳)</label>
          <input type="number" id="f-price" placeholder="e.g. 45" min="0" step="0.01">
        </div>
      </div>
      <div class="form-group">
        <label for="f-date">Date Tasted *</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Your Rating</label>
        <div class="star-picker" id="star-picker">
          <button class="star-btn" data-star="1" type="button">★</button>
          <button class="star-btn" data-star="2" type="button">★</button>
          <button class="star-btn" data-star="3" type="button">★</button>
          <button class="star-btn" data-star="4" type="button">★</button>
          <button class="star-btn" data-star="5" type="button">★</button>
          <span id="star-label" style="font-size:var(--text-xs);color:var(--color-text-faint);margin-left:4px">Not rated</span>
        </div>
      </div>
      <div class="form-group">
        <label for="f-comment">Comment / Notes</label>
        <textarea id="f-comment" placeholder="How did it taste? Would you buy again?"></textarea>
      </div>
      <div class="form-group">
        <label>Photo</label>
        <div class="image-upload-area" id="upload-area">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto;color:var(--color-text-faint)"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <p class="upload-hint">Click to upload or drag & drop an image</p>
          <input type="file" id="f-image" accept="image/*">
        </div>
        <img id="image-preview" class="image-preview" alt="Preview">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="save-btn">Save Entry</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
let entries = JSON.parse(localStorage.getItem('tastelog') || '[]');
let editingId = null;
let selectedRating = 0;

const BANNER_COLORS = {
  Juice:  { from: '#fde68a', to: '#f59e0b' },
  Chips:  { from: '#fca5a5', to: '#ef4444' },
  Snack:  { from: '#a7f3d0', to: '#10b981' },
  Drink:  { from: '#bfdbfe', to: '#3b82f6' },
  Candy:  { from: '#f9a8d4', to: '#ec4899' },
  Other:  { from: '#e5e7eb', to: '#9ca3af' },
};
const CATEGORY_EMOJI = { Juice:'🧃', Chips:'🍟', Snack:'🍿', Drink:'🥤', Candy:'🍬', Other:'🍽️' };

function save() { localStorage.setItem('tastelog', JSON.stringify(entries)); }

function renderStars(r) {
  return '★'.repeat(r) + '☆'.repeat(5 - r);
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function renderCard(e) {
  const colors = BANNER_COLORS[e.category] || BANNER_COLORS.Other;
  const emoji = CATEGORY_EMOJI[e.category] || '🍽️';
  return `
    <article class="card" data-category="${e.category}" data-id="${e.id}" role="article">
      <div class="card-banner">
        ${e.image
          ? `<img class="card-banner-img" src="${e.image}" alt="${e.name}">`
          : `<div class="card-banner-overlay" style="--banner-from:${colors.from};--banner-to:${colors.to};">
               <div class="card-banner-placeholder">${emoji}</div>
             </div>`
        }
      </div>
      <div class="card-body">
        <div class="card-header">
          <div class="food-icon">
            ${e.image
              ? `<img src="${e.image}" alt="${e.name}">`
              : `<span>${emoji}</span>`
            }
          </div>
          <div class="food-meta">
            <div class="food-name">${e.name}</div>
            <div class="food-brand">${e.brand}</div>
          </div>
        </div>

        ${e.comment ? `<p class="food-comment">"${e.comment}"</p>` : ''}

        <div class="card-divider"></div>

        <div class="card-stats">
          <div class="stat">
            <span class="stat-value">${e.price ? '৳' + Number(e.price).toLocaleString() : '—'}</span>
            <span class="stat-label">Price</span>
          </div>
          <div class="stat">
            <span class="stat-value">${formatDate(e.date)}</span>
            <span class="stat-label">Tasted</span>
          </div>
        </div>

        <div class="card-tags">
          <span class="tag">${e.category}</span>
          <span class="tag alt">${e.brand}</span>
        </div>

        <div class="card-footer">
          <div class="food-date">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            ${formatDate(e.date)}
          </div>
          <div class="rating" aria-label="Rating ${e.rating} out of 5">
            <span class="rating-stars">${renderStars(e.rating || 0)}</span>
            ${e.rating ? e.rating + '/5' : 'No rating'}
          </div>
        </div>

        <div class="card-actions">
          <button class="btn-icon" data-edit="${e.id}" title="Edit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon delete" data-delete="${e.id}" title="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
    </article>
  `;
}

let activeFilter = 'all', searchQuery = '';

function filterAndRender() {
  const grid = document.getElementById('card-grid');
  const filtered = entries.filter(e => {
    const mf = activeFilter === 'all' || e.category === activeFilter;
    const mq = !searchQuery || e.name.toLowerCase().includes(searchQuery) || e.brand.toLowerCase().includes(searchQuery) || (e.comment||'').toLowerCase().includes(searchQuery);
    return mf && mq;
  });
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 1rem;color:var(--color-text-faint)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p style="font-size:var(--text-sm)">No entries yet. Hit <strong>Add Entry</strong> to start tracking!</p>
    </div>`;
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
  }
}

// ── FILTERS ──
document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  filterAndRender();
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  filterAndRender();
});

// ── MODAL ──
const backdrop = document.getElementById('modal-backdrop');
function openModal(title = 'Add Food Entry') {
  document.getElementById('modal-title').textContent = title;
  backdrop.classList.add('open');
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}
function closeModal() {
  backdrop.classList.remove('open');
  editingId = null;
  selectedRating = 0;
  document.getElementById('f-name').value = '';
  document.getElementById('f-brand').value = '';
  document.getElementById('f-category').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-comment').value = '';
  document.getElementById('image-preview').style.display = 'none';
  document.getElementById('image-preview').src = '';
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('star-label').textContent = 'Not rated';
  window._pendingImage = null;
}

document.getElementById('open-modal').addEventListener('click', () => openModal());
document.getElementById('close-modal').addEventListener('click', closeModal);
document.getElementById('cancel-btn').addEventListener('click', closeModal);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });

// ── STAR PICKER ──
document.getElementById('star-picker').addEventListener('click', e => {
  if (!e.target.matches('.star-btn')) return;
  selectedRating = parseInt(e.target.dataset.star);
  const labels = ['','Poor','Fair','Good','Great','Excellent'];
  document.getElementById('star-label').textContent = labels[selectedRating] || '';
  document.querySelectorAll('.star-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.star) <= selectedRating);
  });
});

// ── IMAGE UPLOAD ──
document.getElementById('f-image').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    window._pendingImage = ev.target.result;
    const preview = document.getElementById('image-preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

// ── SAVE ──
document.getElementById('save-btn').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  const brand = document.getElementById('f-brand').value.trim();
  const category = document.getElementById('f-category').value;
  const price = document.getElementById('f-price').value;
  const date = document.getElementById('f-date').value;
  const comment = document.getElementById('f-comment').value.trim();
  if (!name || !brand || !category || !date) {
    alert('Please fill in Name, Brand, Category, and Date.');
    return;
  }
  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx > -1) {
      entries[idx] = { ...entries[idx], name, brand, category, price, date, comment, rating: selectedRating, image: window._pendingImage || entries[idx].image };
    }
  } else {
    entries.unshift({ id: Date.now().toString(), name, brand, category, price, date, comment, rating: selectedRating, image: window._pendingImage || null });
  }
  save();
  closeModal();
  filterAndRender();
});

// ── EDIT / DELETE ──
document.getElementById('card-grid').addEventListener('click', e => {
  const editId = e.target.closest('[data-edit]')?.dataset.edit;
  const deleteId = e.target.closest('[data-delete]')?.dataset.delete;
  if (editId) {
    const entry = entries.find(e => e.id === editId);
    if (!entry) return;
    editingId = editId;
    document.getElementById('f-name').value = entry.name;
    document.getElementById('f-brand').value = entry.brand;
    document.getElementById('f-category').value = entry.category;
    document.getElementById('f-price').value = entry.price || '';
    document.getElementById('f-date').value = entry.date || '';
    document.getElementById('f-comment').value = entry.comment || '';
    selectedRating = entry.rating || 0;
    document.querySelectorAll('.star-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.star) <= selectedRating);
    });
    const labels = ['','Poor','Fair','Good','Great','Excellent'];
    document.getElementById('star-label').textContent = labels[selectedRating] || 'Not rated';
    if (entry.image) {
      const preview = document.getElementById('image-preview');
      preview.src = entry.image;
      preview.style.display = 'block';
      window._pendingImage = entry.image;
    }
    openModal('Edit Entry');
  }
  if (deleteId) {
    if (!confirm('Delete this entry?')) return;
    entries = entries.filter(e => e.id !== deleteId);
    save();
    filterAndRender();
  }
});

// ── THEME ──
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  r.setAttribute('data-theme', d);
  if (t) t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    localStorage.setItem('theme', d);
    t.innerHTML = d === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

filterAndRender();
</script>
</body>
</html>
